name: VPN Checker Pro
on:
  workflow_dispatch:
  push:
    paths:
      - 'check.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Xray Checker
        run: |
          # Скачиваем чекер по инструкции из репозитория kutovoys/xray-checker
          curl -sL -o - $(curl -s https://api.github.com/repos/kutovoys/xray-checker/releases/latest | grep "browser_download_url.*linux-amd64.tar.gz" | cut -d'"' -f4) | tar -xz
          chmod +x xray-checker

      - name: Run Check
        run: |
          # 1. Запускаем локальный сервер для чекера
          python3 -m http.server 8000 & 
          sleep 2

          # 2. Запускаем чекер и сохраняем полный лог в файл
          ./xray-checker --subscription-url="http://localhost:8000/check.txt" --run-once > full_log.txt 2>&1
          
          # Выводим лог в консоль GitHub для отладки
          cat full_log.txt

          # 3. Подготовка итогового файла
          echo "#profile-title: LLxickVPN" > results.txt
          echo "#profile-update-interval: 12" >> results.txt
          echo "#subscription-userinfo: total=0; expire=17837459931" >> results.txt
          echo "" >> results.txt

          # 4. Логика фильтрации:
          # Ищем строки со словом Success, вырезаем имя прокси и ищем его в check.txt
          grep "Success" full_log.txt | while read -r line; do
            # Извлекаем имя прокси (текст между временем и символом '|')
            # Пример из лога: 19:17:04 🇷🇺 [LTE] №1 | Success
            proxy_name=$(echo "$line" | sed -E 's/.*[0-9]{2}:[0-9]{2}:[0-9]{2} (.*) \| Success.*/\1/' | xargs)
            
            # Ищем оригинальную ссылку в check.txt по этому имени
            if [ ! -z "$proxy_name" ]; then
              grep "$proxy_name" check.txt >> results.txt || true
            fi
          done

      - name: Push results
        run: |
          git config --global user.name "VPN-Bot"
          git config --global user.email "bot@github.com"
          git add results.txt
          git commit -m "Update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push