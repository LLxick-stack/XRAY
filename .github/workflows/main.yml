name: VPN Checker Xray
on:
  workflow_dispatch:
  push:
    paths:
      - 'check.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Xray
        run: |
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip xray
          chmod +x xray

      - name: Create Python Checker
        run: |
          cat << 'EOF' > internal_check.py
          import subprocess, json, time, os, socket, requests
          from concurrent.futures import ThreadPoolExecutor

          def get_free_port():
              with socket.socket() as s:
                  s.bind(('', 0))
                  return s.getsockname()[1]

          def test_config(link):
              if not link.startswith("vless://"): return None
              port = get_free_port()
              try:
                  # Парсинг базовых данных
                  main = link.split('://')[1]
                  uuid, tail = main.split('@')
                  addr_port = tail.split('?')[0].split('#')[0]
                  addr, vport = addr_port.rsplit(':', 1)
                  
                  config = {
                      "log": {"loglevel": "none"},
                      "inbounds": [{"port": port, "listen": "127.0.0.1", "protocol": "socks"}],
                      "outbounds": [{"protocol": "vless", "settings": {"vnext": [{"address": addr, "port": int(vport), "users": [{"id": uuid, "encryption": "none"}]}]}}]
                  }
                  
                  # Добавление Reality/TLS если есть
                  if '?' in tail:
                      params = dict(x.split('=') for x in tail.split('?')[1].split('#')[0].split('&') if '=' in x)
                      stream = {"network": params.get('type', 'tcp'), "security": params.get('security', 'none')}
                      if params.get('security') == 'reality':
                          stream["realitySettings"] = {"serverName": params.get('sni'), "publicKey": params.get('pbk'), "shortId": params.get('sid', ''), "fingerprint": params.get('fp', 'chrome')}
                      config["outbounds"][0]["streamSettings"] = stream

                  with open(f"c_{port}.json", "w") as f: json.dump(config, f)
                  proc = subprocess.Popen(["./xray", "-c", f"c_{port}.json"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  time.sleep(2)
                  
                  success = False
                  try:
                      r = requests.get("http://cp.cloudflare.com/generate_204", proxies={"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}, timeout=5)
                      if r.status_code == 204: success = True
                  except: pass
                  
                  proc.terminate()
                  os.remove(f"c_{port}.json")
                  return link if success else None
              except: return None

          with open("check.txt", "r") as f:
              links = [l.strip() for l in f if "://" in l]

          with ThreadPoolExecutor(max_workers=5) as ex:
              results = [r for r in ex.map(test_config, links) if r]

          header = "#profile-title: LLxickVPN\n#profile-update-interval: 12\n\n"
          with open("results.txt", "w") as f:
              f.write(header)
              for i, l in enumerate(results, 1):
                  f.write(f"{l.split('#')[0]}#🇷🇺 [LTE] №{i}\n")
          EOF

      - name: Run Checker
        run: |
          pip install requests
          python3 internal_check.py

      - name: Push results
        run: |
          git config --global user.name "VPN-Bot"
          git config --global user.email "bot@github.com"
          git add results.txt
          git commit -m "Update" || exit 0
          git push